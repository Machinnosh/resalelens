version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery-worker:
    build: .
    command: celery -A tasks.scraping_tasks worker --loglevel=info --concurrency=2
    depends_on:
      - redis
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    working_dir: /app

  celery-beat:
    build: .
    command: celery -A tasks.scraping_tasks beat --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    working_dir: /app

volumes:
  redis_data:
